services:
  # 1. The Database (For Core API)
  mongodb:
    image: mongo:latest
    container_name: hexanodes_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # 2. The Message Broker (For Video Processing Queue)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hexanodes_rabbitmq
    ports:
      - "5672:5672"   # Main port for your Node/Python code to connect
      - "15672:15672" # Web UI Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  # 3. Distributed Object Storage (For Video Files)
  minio:
    image: minio/minio
    container_name: hexanodes_minio
    ports:
      - "9000:9000" # API port for your code to upload/download
      - "9001:9001" # Web UI Dashboard
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # 4. Backend API
  backend-api:
    image: node:20-alpine
    container_name: hexanodes_backend_api
    working_dir: /app
    volumes:
      - ./backend-api:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: VideoDS
      ACCESS_TOKEN_SECRET: dev_access_secret_change_me
      ACCESS_TOKEN_EXPIRY: 1d
      REFRESH_TOKEN_SECRET: dev_refresh_secret_change_me
      REFRESH_TOKEN_EXPIRY: 10d
      RABBITMQ_URL: amqp://rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - rabbitmq
      - minio
    restart: unless-stopped

  # 5. Frontend App
  frontend:
    image: node:20-alpine
    container_name: hexanodes_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:3000
      VITE_MINIO_BASE_URL: http://localhost:9000
      VITE_LIVE_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend-api
    restart: unless-stopped

   # 6. Live Streaming Server (The Origin Receiver for OBS)
  nginx-origin:
    image: tiangolo/nginx-rtmp
    container_name: hexanodes_origin
    ports:
      - "1935:1935" 
      - "8081:80" # for stats 
    volumes:
      - ./nginx-origin/nginx.conf:/etc/nginx/nginx.conf
      - recordings_data:/tmp/recordings
    command: /bin/sh -c "chmod 777 /tmp/recordings && nginx -g 'daemon off;'"
    depends_on:
      - backend-api
    restart: unless-stopped

    # 7a. First Edge Container
  nginx-edge-1:
    image: nginx:latest
    container_name: hexanodes_edge_1
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - nginx-origin
    restart: unless-stopped

  # 7b. Second Edge Container (Identical to Edge 1)
  nginx-edge-2:
    image: nginx:latest
    container_name: hexanodes_edge_2
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - nginx-origin
    restart: unless-stopped

  # 8. The Load Balancer
  nginx-loadbalancer:
    image: nginx:latest
    container_name: hexanodes_lb
    ports:
      - "8080:8080" # The main entry point for frontend
    volumes:
      - ./nginx-lb/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - nginx-edge-1
      - nginx-edge-2
    restart: unless-stopped


  # 9. Video Processing Worker (Scalable)
  worker-node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./worker-node:/app
      - /app/node_modules
      - recordings_data:/tmp/recordings
    command: sh -c "apk add --no-cache ffmpeg ttf-dejavu fontconfig && npm install && npm run dev"
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
      PREFETCH_COUNT: 1
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
      WEBHOOK_BASE_URL: http://backend-api:3000
    depends_on:
      - rabbitmq
      - minio
      - backend-api
    restart: unless-stopped


# Named volumes so your data doesn't disappear when you restart Docker
volumes:
  mongodb_data:
  minio_data:
  recordings_data: