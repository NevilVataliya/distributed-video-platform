version: '3.8'

services:
  # 1. The Database (For Core API)
  mongodb:
    image: mongo:latest
    container_name: hexanodes_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # 2. The Message Broker (For Video Processing Queue)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hexanodes_rabbitmq
    ports:
      - "5672:5672"   # Main port for your Node/Python code to connect
      - "15672:15672" # Web UI Dashboard
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  # 3. Distributed Object Storage (For Video Files)
  minio:
    image: minio/minio
    container_name: hexanodes_minio
    ports:
      - "9000:9000" # API port for your code to upload/download
      - "9001:9001" # Web UI Dashboard
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

   # 4. Live Streaming Server (The Origin Receiver for OBS)
  nginx-origin:
    image: tiangolo/nginx-rtmp
    container_name: hexanodes_origin
    ports:
      - "1935:1935" 
    volumes:
      - ./nginx-origin/nginx.conf:/etc/nginx/nginx.conf
      - recordings_data:/tmp/recordings
    command: /bin/sh -c "chmod 777 /tmp/recordings && nginx -g 'daemon off;'"
    restart: unless-stopped

    # 5a. First Edge Container
  nginx-edge-1:
    image: nginx:latest
    container_name: hexanodes_edge_1
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - nginx-origin

  # 5b. Second Edge Container (Identical to Edge 1)
  nginx-edge-2:
    image: nginx:latest
    container_name: hexanodes_edge_2
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - nginx-origin

  # 6. The Load Balancer
  nginx-loadbalancer:
    image: nginx:latest
    container_name: hexanodes_lb
    ports:
      - "8080:8080" # The main entry point for frontend
    volumes:
      - ./nginx-lb/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - nginx-edge-1
      - nginx-edge-2


  # 7. Video Processing Worker (Scalable)
  worker-node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./worker-node:/app
      - recordings_data:/tmp/recordings
    command: sh -c "apk add --no-cache ffmpeg ttf-dejavu fontconfig && npm install && npm run dev"
    depends_on:
      - rabbitmq
      - minio
    extra_hosts:
    - "host.docker.internal:host-gateway"
    restart: unless-stopped


# Named volumes so your data doesn't disappear when you restart Docker
volumes:
  mongodb_data:
  minio_data:
  recordings_data: