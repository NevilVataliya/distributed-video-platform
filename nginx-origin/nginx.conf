events {
    worker_connections 1024;
}

# The RTMP block: Receives the live feed from OBS on port 1935
rtmp {
    server {
        listen 1935;
        application live {
            live on;
            
            # Security: Asks backend API if the user's Stream Key is valid
            on_publish http://host.docker.internal:3000/api/videos/stream/auth;
            
            # Slice the live video into playable HLS chunks in a temporary folder
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;
        }
    }
}

# The HTTP block: Internal server so nginx-edge can grab the chunks
http {
    server {
        listen 80;
        
        location /hls {
            # Looks inside the temporary folder where the RTMP block saved the chunks
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
        }
    }
}
