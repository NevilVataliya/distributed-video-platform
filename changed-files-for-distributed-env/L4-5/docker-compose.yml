services:
  worker-node:
    image: node:20-alpine
    container_name: hexanodes_worker
    working_dir: /app
    volumes:
      - ./worker-node:/app
      - /app/node_modules
      - recordings_data:/tmp/recordings
    command: sh -c "apk add --no-cache ffmpeg ttf-dejavu fontconfig && npm install && npm run dev"
    environment:
      RABBITMQ_URL: amqp://192.168.1.10:5672
      MINIO_ENDPOINT: 192.168.1.10
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      WEBHOOK_BASE_URL: http://192.168.1.14:3000
    restart: unless-stopped

volumes:
  recordings_data: