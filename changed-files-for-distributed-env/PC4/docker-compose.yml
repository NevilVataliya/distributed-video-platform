services:
  minio:
    image: minio/minio
    container_name: hexanodes_minio
    ports:
      - "9000:9000" 
      - "9001:9001" 
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server http://[PC1_IP]:9000/data http://[PC2_IP]:9000/data http://[PC3_IP]:9000/data http://[PC4_IP]:9000/data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  minio_data: