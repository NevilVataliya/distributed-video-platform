daemon off;
events { worker_connections 1024; }

rtmp {
    server {
        listen 1935;
        application live {
            live on;
            on_publish http://192.168.1.14:3000/api/webhooks/stream-start;
            
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;

            record all;
            record_path /tmp/recordings;
            record_unique on;

            on_record_done http://192.168.1.14:3000/api/webhooks/stream-end;
        }
    }
}

http {
    server {
        listen 80;
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
        }
    }
}