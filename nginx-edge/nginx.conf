events {
    worker_connections 1024;
}

# The HTTP Proxy: Grabs chunks from the receiver and gives them to the Frontend
http {
    server {
        # for frontend video player
        listen 8080;
        
        # When frontend requests a stream URL ending in /live/...
        location /live/ {
            #  HOTLINK PROTECTION (security guard)

            # Only allow requests from our frontend (and direct browser hits for testing)
            valid_referers none blocked localhost 127.0.0.1;
            
            # if ($invalid_referer) {
            #     return 403;
            # }

            # Handle CORS preflight directly at the edge.
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            # Reach across the Docker network to grab chunks from your Origin server
            proxy_pass http://nginx-origin:80/hls/;

            # Avoid duplicate CORS values if upstream ever sends CORS headers.
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Expose-Headers;
            
            # CDN Caching (Caches the chunk for 10 seconds to save Origin bandwidth)
            add_header Cache-Control "public, max-age=10";
            
            # CORS Security (Crucial: React player will be instantly blocked by the browser if this is missing)
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
            add_header Vary "Origin" always;
        }
    }
}
